services:
  - type: web
    name: magic-transfer
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SERVER_HOST
        value: "0.0.0.0"
      - key: API_KEY
        generateValue: true
      - key: MAX_UPLOAD_BYTES
        value: "524288000"
    disk:
      name: uploads
      mountPath: /output
      sizeGB: 1
