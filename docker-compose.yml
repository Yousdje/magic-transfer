version: '3.8'

services:
  magic-transfer:
    build:
      context: .
      target: production
    container_name: magic-transfer
    hostname: magic-transfer
    # No port exposure needed — cloudflared handles ingress
    volumes:
      - transfer-data:/output:rw
    environment:
      - PYTHONUNBUFFERED=1
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-524288000}
      - SESSION_TTL_MINUTES=${SESSION_TTL_MINUTES:-60}
    restart: unless-stopped
    networks:
      - magic-network
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - magic-network
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  transfer-data:

networks:
  magic-network:
    driver: bridge
